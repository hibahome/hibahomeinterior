<style>
body {margin:0; font-family:sans-serif;}

/* NAVBAR */
nav {
position:fixed;
width:100%;
background:rgba(0,0,0,0.5);
backdrop-filter: blur(10px);
display:flex;
justify-content:center;
z-index:1000;
}
nav a {
color:white;
padding:15px;
text-decoration:none;
}
nav a:hover {color:#c9a96e;}

/* SLIDER */
.slider {
height:100vh;
background-size:cover;
background-position:center;
animation:slide 12s infinite;
}
@keyframes slide {
0% {background-image:url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c');}
33% {background-image:url('https://images.unsplash.com/photo-1616594039964-ae9021a400a0');}
66% {background-image:url('https://images.unsplash.com/photo-1600585154526-990dced4db0d');}
100% {background-image:url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c');}
}

/* HERO TEXT */
.hero-text {
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
text-align:center;
}
.hero-text h1 {font-size:50px;}

/* SECTION */
section {padding:80px 20px; text-align:center;}
h2 {color:#2C3E50;}

/* SERVICES */
.services {
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}
.card {
width:280px;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
transition:0.3s;
}
.card:hover {transform:translateY(-10px);}
.card img {width:60px;}

/* PORTFOLIO */
.portfolio {
display:flex;
flex-wrap:wrap;
gap:15px;
justify-content:center;
}
.portfolio img {
width:300px;
height:200px;
object-fit:cover;
transition:0.3s;
}
.portfolio img:hover {
transform:scale(1.1);
}

/* CONTACT FORM */
form {
max-width:400px;
margin:auto;
display:flex;
flex-direction:column;
gap:10px;
}
input,textarea {
padding:10px;
border:1px solid #ccc;
border-radius:5px;
}
button {
background:#c9a96e;
color:white;
padding:10px;
border:none;
cursor:pointer;
}

/* FOOTER */
footer {
background:#111;
color:white;
padding:20px;
}

/* FLOAT BUTTONS */
.whatsapp, .call {
position:fixed;
bottom:20px;
padding:15px;
border-radius:50%;
color:white;
text-decoration:none;
}
.whatsapp {right:20px; background:#25D366;}
.call {left:20px; background:#3498db;}

</style>
</head>
